name: Build & Sign BevelClone IPA (Sideload Ready)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-sign:
    name: Build & Sign iOS + watchOS
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Show Xcode Version
        run: xcodebuild -version
        
      - name: Check if Secrets are Configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Code signing secrets not configured"
            echo "This workflow requires GitHub Secrets to be set up."
            echo "Please follow CODESIGNING_SETUP.md to configure:"
            echo "  - BUILD_CERTIFICATE_BASE64"
            echo "  - P12_PASSWORD"
            echo "  - BUILD_PROVISION_PROFILE_BASE64"
            echo "  - KEYCHAIN_PASSWORD"
            echo "  - DEVELOPMENT_TEAM"
            echo "  - BUNDLE_IDENTIFIER"
            echo "  - PROVISIONING_PROFILE_NAME"
          else
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
            echo "✅ Secrets are configured"
          fi
        
      - name: Install Apple Certificate and Provisioning Profile
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          WATCH_PROVISION_PROFILE_BASE64: ${{ secrets.WATCH_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          WATCH_PP_PATH=$RUNNER_TEMP/watch_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          
          # Import Watch provisioning profile if available
          if [ -n "$WATCH_PROVISION_PROFILE_BASE64" ]; then
            echo -n "$WATCH_PROVISION_PROFILE_BASE64" | base64 --decode -o $WATCH_PP_PATH
          fi

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          
          if [ -f "$WATCH_PP_PATH" ]; then
            cp $WATCH_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          fi
          
          echo "✅ Certificate and provisioning profiles installed"
        
      - name: Resolve Swift Package Dependencies
        run: |
          if [ -f "BevelClone.xcodeproj/project.pbxproj" ]; then
            xcodebuild -resolvePackageDependencies -project BevelClone.xcodeproj
          else
            echo "⚠️ No Xcode project found - will resolve during build"
          fi
        continue-on-error: true
        
      - name: Build iOS App
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
        run: |
          xcodebuild clean archive \
            -scheme BevelClone \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/BevelClone.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_IDENTIFIER}" \
            | xcpretty || echo "Build completed (may have warnings)"
        
      - name: Export IPA for Sideloading
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
        run: |
          mkdir -p ${{ github.workspace }}/build/ipa
          
          # Create export options plist for development/ad-hoc distribution
          cat > ${{ github.workspace }}/build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_IDENTIFIER}</key>
                  <string>${PROVISIONING_PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          # Export archive to IPA
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/BevelClone.xcarchive \
            -exportPath ${{ github.workspace }}/build/ipa \
            -exportOptionsPlist ${{ github.workspace }}/build/ExportOptions.plist \
            | xcpretty || echo "Export completed"
        
      - name: Verify IPA Creation
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: |
          if [ -f "${{ github.workspace }}/build/ipa/BevelClone.ipa" ]; then
            echo "✅ IPA created successfully"
            ls -lh ${{ github.workspace }}/build/ipa/BevelClone.ipa
            
            # Show IPA details
            unzip -l ${{ github.workspace }}/build/ipa/BevelClone.ipa | head -20
          else
            echo "❌ IPA was not created"
            ls -la ${{ github.workspace }}/build/ipa/
            exit 1
          fi
        
      - name: Clean up Keychain and Provisioning Profiles
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision || true
        
      - name: Show Configuration Instructions
        if: steps.check_secrets.outputs.secrets_configured == 'false'
        run: |
          echo "## ⚠️ Code Signing Not Configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow requires GitHub Secrets for code signing." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Required Secrets (7 total):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. \`BUILD_CERTIFICATE_BASE64\` - Your signing certificate (.p12 → base64)" >> $GITHUB_STEP_SUMMARY
          echo "2. \`P12_PASSWORD\` - Password for the certificate" >> $GITHUB_STEP_SUMMARY
          echo "3. \`BUILD_PROVISION_PROFILE_BASE64\` - iOS provisioning profile" >> $GITHUB_STEP_SUMMARY
          echo "4. \`KEYCHAIN_PASSWORD\` - Temporary keychain password" >> $GITHUB_STEP_SUMMARY
          echo "5. \`DEVELOPMENT_TEAM\` - Your Apple Team ID (10 characters)" >> $GITHUB_STEP_SUMMARY
          echo "6. \`BUNDLE_IDENTIFIER\` - App bundle ID (e.g., com.yourname.bevelclone)" >> $GITHUB_STEP_SUMMARY
          echo "7. \`PROVISIONING_PROFILE_NAME\` - Profile name from Apple Developer" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📖 Setup Guide:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Follow the complete instructions in:" >> $GITHUB_STEP_SUMMARY
          echo "**[CODESIGNING_SETUP.md](https://github.com/${{ github.repository }}/blob/main/CODESIGNING_SETUP.md)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Or the quick start guide in:" >> $GITHUB_STEP_SUMMARY
          echo "**[DEPLOYMENT_GUIDE.md](https://github.com/${{ github.repository }}/blob/main/DEPLOYMENT_GUIDE.md)**" >> $GITHUB_STEP_SUMMARY
          
      - name: Package Build Artifacts
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          
          # Copy IPA
          if [ -f "${{ github.workspace }}/build/ipa/BevelClone.ipa" ]; then
            cp ${{ github.workspace }}/build/ipa/BevelClone.ipa \
              ${{ github.workspace }}/artifacts/BevelClone-signed.ipa
          fi
          
          # Create build info
          cat > ${{ github.workspace }}/artifacts/build-info.txt <<EOF
          ═══════════════════════════════════════════════════════════════════
          BevelClone - Signed IPA Build
          ═══════════════════════════════════════════════════════════════════
          
          Build Date:       $(date)
          Commit Hash:      ${{ github.sha }}
          Branch:           ${{ github.ref_name }}
          Xcode Version:    $(xcodebuild -version | head -n 1)
          Runner:           macos-15
          
          Bundle ID:        ${{ secrets.BUNDLE_IDENTIFIER }}
          Team ID:          ${{ secrets.DEVELOPMENT_TEAM }}
          Signing:          Apple Development (Manual)
          
          ═══════════════════════════════════════════════════════════════════
          SIDELOADING INSTRUCTIONS
          ═══════════════════════════════════════════════════════════════════
          
          ✅ This IPA is signed and ready for sideloading!
          
          Option 1: AltStore (Recommended for Windows)
          ─────────────────────────────────────────────
          1. Install AltStore on your iPhone
          2. Download BevelClone-signed.ipa to your computer
          3. Open AltStore app on iPhone
          4. Tap "+" and select the IPA file
          5. Wait for installation to complete
          
          Option 2: SideStore
          ─────────────────────────────────────────────
          1. Install SideStore using JIT enabler
          2. Import BevelClone-signed.ipa
          3. Install directly on device
          
          Option 3: Xcode (macOS only)
          ─────────────────────────────────────────────
          1. Connect iPhone via USB
          2. Open Xcode → Window → Devices and Simulators
          3. Drag BevelClone-signed.ipa onto your device
          
          ⚠️ IMPORTANT: Free developer accounts require re-signing every 7 days
          
          ═══════════════════════════════════════════════════════════════════
          EOF
          
          echo "📦 Artifacts prepared"
          ls -lh ${{ github.workspace }}/artifacts/
        
      - name: Upload Signed IPA
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: BevelClone-signed-${{ github.sha }}
          path: |
            ${{ github.workspace }}/artifacts/BevelClone-signed.ipa
            ${{ github.workspace }}/artifacts/build-info.txt
          retention-days: 30
          if-no-files-found: warn
          
      - name: Build Summary
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: |
          echo "## 📱 Signed Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** macOS 15 with Xcode 16.2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "${{ github.workspace }}/artifacts/BevelClone-signed.ipa" ]; then
            IPA_SIZE=$(du -h "${{ github.workspace }}/artifacts/BevelClone-signed.ipa" | cut -f1)
            echo "✅ **Signed IPA Created:** BevelClone-signed.ipa ($IPA_SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚀 Ready for Sideloading!" >> $GITHUB_STEP_SUMMARY
            echo "Download the artifact and install using AltStore or SideStore." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **IPA Creation Failed**" >> $GITHUB_STEP_SUMMARY
            echo "Check the build logs for errors." >> $GITHUB_STEP_SUMMARY
          fi
