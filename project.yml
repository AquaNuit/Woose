name: BevelClone
options:
  bundleIdPrefix: com.example
targets:
  BevelClone:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BevelClone
    dependencies:
      - target: BevelClone Watch App
        embed: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.BevelClone
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"

  BevelClone Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: "BevelClone Watch App"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.BevelClone.watchkitapp
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.example.BevelClone
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
