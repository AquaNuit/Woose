name: BevelClone
options:
  bundleIdPrefix: com.example
targets:
  BevelClone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BevelClone
    dependencies:
      - target: BevelClone Watch App
        embed: true
    entitlements:
      path: BevelClone/BevelClone.entitlements
    info:
      path: BevelClone/Info.plist
      properties:
        UILaunchScreen:
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIdentifier: com.example.BevelClone
        CFBundleName: BevelClone
        CFBundleExecutable: BevelClone
        CFBundlePackageType: APPL
        NSHealthShareUsageDescription: "Bevel Clone needs access to your health data to calculate Strain, Recovery, Sleep quality, and Biological Age metrics. Your data stays private on your device."
        NSHealthUpdateUsageDescription: "Bevel Clone needs to save data to HealthKit to track your journal entries and habits."
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.bevelclone.healthsync
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.BevelClone
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"

  BevelClone Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "BevelClone Watch App"
      - path: "BevelClone/Backend"
    entitlements:
      path: "BevelClone Watch App/BevelCloneWatchApp.entitlements"
    info:
      path: "BevelClone Watch App/Info.plist"
      properties:
        WKCompanionAppBundleIdentifier: com.example.BevelClone
        WKApplication: true
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIdentifier: com.example.BevelClone.watchkitapp
        CFBundleName: "BevelClone Watch App"
        CFBundleExecutable: "BevelClone Watch App"
        CFBundlePackageType: APPL
        NSHealthShareUsageDescription: "Bevel Clone Watch App needs access to your health data to monitor real-time heart rate and workouts."
        NSHealthUpdateUsageDescription: "Bevel Clone Watch App needs to save your workouts to HealthKit."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.BevelClone.watchkitapp
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
